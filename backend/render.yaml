services:
  - type: web
    name: om-satarkar-store-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        value: mongodb://127.0.0.1:27017/om_satarkar_store
      - key: JWT_SECRET
        value: replace-with-a-long-secret
      - key: FRONTEND_URL
        value: https://your-frontend-service.onrender.com
      - key: ADMIN_NAME
        value: Om Satarkar
      - key: ADMIN_LOGIN
        value: om
      - key: ADMIN_EMAIL
        value: admin@omsatarkar.store
      - key: ADMIN_PASSWORD
        value: ChangeMe123!
